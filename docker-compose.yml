version: "3.9"

services:
  db:
    image: postgres:16
    container_name: collabnote
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: collabnote
    ports:
      - "5432:5432"
    volumes:
      - pgdata_lab4:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lab4_db"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  pgdata_collabnote:
